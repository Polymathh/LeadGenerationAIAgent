<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minet Kenya Insurance Ad</title>
    <style>
        :root {
            --brand-red: #ed1b24;
            --brand-red-dark: #b70f18;
            --brand-red-soft: #fff1f2;
            --ink: #201f24;
            --muted: #62606a;
            --line: #e7e3e4;
            --panel: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Inter, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(237, 27, 36, 0.08) 0 1px, transparent 1px 28px),
                #faf8f8;
        }

        .ad-container {
            width: min(100%, 420px);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(32, 31, 36, 0.08);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(32, 31, 36, 0.18);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .ad-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 76px rgba(32, 31, 36, 0.22);
        }

        .ad-header {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: #ffffff;
        }

        .profile-pic {
            width: 42px;
            height: 42px;
            flex: 0 0 42px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 8px 18px rgba(237, 27, 36, 0.22);
        }

        .company-info {
            min-width: 0;
            flex: 1;
        }

        .company-name {
            color: var(--ink);
            font-size: 15px;
            font-weight: 800;
            line-height: 1.1;
        }

        .sponsored {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }

        .brand-chip {
            min-height: 30px;
            padding: 0 10px;
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--brand-red);
            border-radius: 6px;
            color: var(--brand-red);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .visual-wrap {
            position: relative;
            min-height: 390px;
            background: var(--brand-red);
        }

        .ad-image {
            width: 100%;
            height: 390px;
            display: block;
            object-fit: cover;
        }

        .visual-wrap::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(32, 31, 36, 0.02) 0%, rgba(32, 31, 36, 0.62) 100%),
                linear-gradient(135deg, rgba(237, 27, 36, 0.52), transparent 48%);
            pointer-events: none;
        }

        .logo-frame {
            position: absolute;
            left: 18px;
            top: 18px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px 8px 8px;
            border: 2px solid rgba(255, 255, 255, 0.88);
            border-radius: 8px;
            background: rgba(237, 27, 36, 0.82);
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .logo-frame img {
            width: 34px;
            height: 34px;
            object-fit: cover;
            border-radius: 4px;
        }

        .ad-content {
            padding: 20px 18px 18px;
            border-top: 6px solid var(--brand-red);
            background: #ffffff;
        }

        .headline {
            margin-bottom: 9px;
            color: var(--ink);
            font-size: 24px;
            font-weight: 800;
            line-height: 1.08;
        }

        .description {
            margin-bottom: 18px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.45;
        }

        .proof-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }

        .proof-row span {
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--brand-red-soft);
            color: var(--brand-red-dark);
            font-size: 11px;
            font-weight: 800;
            text-align: center;
        }

        .cta-button {
            width: 100%;
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 6px;
            background: var(--brand-red);
            color: #ffffff;
            box-shadow: 0 12px 24px rgba(237, 27, 36, 0.28);
            font-size: 15px;
            font-weight: 800;
            text-decoration: none;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cta-button:hover {
            background: var(--brand-red-dark);
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(237, 27, 36, 0.34);
        }

        .ad-footer {
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
            text-align: center;
        }

        @media (max-width: 450px) {
            body {
                padding: 14px;
            }

            .visual-wrap,
            .ad-image {
                min-height: 340px;
                height: 340px;
            }

            .headline {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <article class="ad-container" aria-label="Minet Kenya insurance advertisement">
        <header class="ad-header">
            <img src="profile.jpg" alt="Minet Kenya logo" class="profile-pic">
            <div class="company-info">
                <div class="company-name">Minet Kenya</div>
                <div class="sponsored">Sponsored</div>
            </div>
            <div class="brand-chip">Quote</div>
        </header>

        <div class="visual-wrap">
            <img src="kenya_insurance_ad_visual.png" alt="Kenyan family protected by insurance cover" class="ad-image">
            
        </div>

        <div class="ad-content">
            <div class="headline">Protect what matters with Minet Kenya.</div>
            <!-- <div class="description">
                Get a personalized insurance quote for medical, life, motor, education, or business cover.
            </div>
            <div class="proof-row" aria-label="Service highlights">
                <span>Fast quote</span>
                <span>Local support</span>
                <span>Claims help</span>
            </div> -->
            <a class="cta-button" href="landing.html">Get My Quote</a>
            <!-- <div class="ad-footer">Tap to continue to the Minet quote page.</div> -->
        </div>
    </article>

</body>
</html>
